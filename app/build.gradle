plugins {
    id 'com.android.application'
}

def backendBaseUrl = project.findProperty("spotifyFrameBackendUrl") ?: "http://192.168.1.50:8000"

android {
    namespace 'com.janek.spotifyframe'
    compileSdk 34

    buildFeatures {
        buildConfig true
    }

    defaultConfig {
        applicationId "com.janek.spotifyframe"
        minSdk 17
        targetSdk 17
        versionCode 3
        versionName "1.2"
        buildConfigField "String", "BACKEND_BASE_URL", "\"${backendBaseUrl}\""
    }

    buildTypes {
        debug {
            minifyEnabled false
        }

        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}
